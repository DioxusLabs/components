name: Rust CI

on:
  push:
    branches:
      - main
    paths:
      - /**
      - preview/**/*.rs
      - preview/**/Cargo.toml
      - primitives/**/*.rs
      - primitives/**/Cargo.toml
      - .github/**
      - Cargo.toml

  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - /**
      - preview/**/*.rs
      - preview/**/Cargo.toml
      - primitives/**/*.rs
      - primitives/**/Cargo.toml
      - .github/**
      - Cargo.toml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.pull_request.draft == false
    name: Build
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          cache-on-failure: "true"
          cache-directories: "target/dx"
          shared-key: ubuntu-24.04-build
      - uses: cargo-bins/cargo-binstall@main
      - name: Install CLI
        run: cargo binstall dioxus-cli -y --force --version 0.7.0
      - name: Build preview app
        run: cd ./preview && dx build --web

  playwright-setup:
    if: github.event.pull_request.draft == false
    uses: ./.github/workflows/playwright-setup.yml

  check:
    if: github.event.pull_request.draft == false
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          version: 1.0
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          cache-on-failure: "false"
          cache-directories: "target/dx"
          shared-key: ubuntu-24.04-build
      - name: Check
        run: cargo check --workspace --all-features

  test:
    needs: build
    if: github.event.pull_request.draft == false
    name: Test Suite
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Free Disk Space
        uses: ./.github/actions/free-disk-space
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          version: 1.0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          shared-key: ubuntu-24.04-build
      - uses: browser-actions/setup-firefox@latest
      - run: cargo test --workspace

  fmt:
    if: github.event.pull_request.draft == false
    name: Rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          shared-key: ubuntu-24.04-build
      - run: cargo fmt --all -- --check

  docs:
    needs: build
    if: github.event.pull_request.draft == false
    name: Docs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          version: 1.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          shared-key: ubuntu-24.04-build
      - name: "doc --lib --all-features"
        run: |
          cargo doc --workspace --no-deps --all-features --document-private-items
        env:
          RUSTDOCFLAGS: -Dwarnings --document-private-items

  clippy:
    needs: build
    if: github.event.pull_request.draft == false
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          version: 1.0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          shared-key: ubuntu-24.04-build
      - run: cargo clippy --workspace --examples --tests --all-features --all-targets -- -D warnings

  add-all-components:
    needs: build
    if: github.event.pull_request.draft == false
    name: Add All Components
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          version: 1.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          cache-on-failure: "false"
          shared-key: ubuntu-24.04-build
      - uses: cargo-bins/cargo-binstall@main
      - name: Install CLI
        run: cargo binstall dioxus-cli -y --force --version 0.7.0
      - name: Add components and check
        run: |
          cd test-harness
          # Add dependencies manually; TODO: remove this once dx components supports local dependencies
          dx components add calendar,popover --path ..
          dx components add button,separator,sheet,tooltip --path ..
          # Add all components
          dx components add --all --path .. --force
          # Switch to the local version of dioxus-primitives
          cargo add dioxus-primitives --path ../primitives
          # Make sure it still builds
          cargo check --all-features

  add-each-component:
    needs: build
    if: github.event.pull_request.draft == false
    name: Add Each Components
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          version: 1.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          cache-on-failure: "false"
          shared-key: ubuntu-24.04-build
      - uses: cargo-bins/cargo-binstall@main
      - name: Install CLI
        run: cargo binstall dioxus-cli -y --force --version 0.7.0
      - name: Add each component and check
        run: |
          cd preview/src/components/
          for file in *; do
            if [ -d "$file" ]; then
              echo "Testing component: $file"
            else
              continue
            fi
            # Go to test harness
            cd ../../../test-harness
            # Add dependencies manually; TODO: remove this once dx components supports local dependencies
            if [ "$file" = "date_picker" ]; then
              dx components add calendar,popover --path ..
            elif [ "$file" = "sidebar" ]; then
              dx components add button,separator,sheet,tooltip --path ..
            fi
            # Add the component
            dx components add "$file" --path ..
            # Switch to the local version of dioxus-primitives
            cargo add dioxus-primitives --path ../primitives
            # Make sure it still builds
            cargo check --all-features
            # Undo changes
            dx components remove --all --path ..
            cd ../preview/src/components/
          done

  playwright-tests:
    needs: [build, playwright-setup]
    if: github.event.pull_request.draft == false
    name: Playwright (${{ matrix.shard_index }}/${{ matrix.shard_total }})
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3, 4]
        shard_total: [4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          cache-on-failure: "true"
          cache-directories: "target/dx"
          shared-key: ubuntu-24.04-build
          save-if: false
      - uses: cargo-bins/cargo-binstall@main
      - name: Install CLI
        run: cargo binstall dioxus-cli -y --force --version 0.7.0
      - name: Install dependencies
        run: cd ./playwright && npm ci
      - name: Restore Playwright browsers
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: ubuntu-24.04-playwright-${{ hashFiles('playwright/package-lock.json') }}
      - name: Run Playwright tests
        run: cd ./playwright && npx playwright test --shard=${{ matrix.shard_index }}/${{ matrix.shard_total }}
      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard_index }}
          path: blob-report
          retention-days: 1
